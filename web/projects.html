<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/bootstrap.min.css" >
    </head>
    <body>
        <div>
            <h2>PROJECTS</h2>  
        </div>
        <br>
        <div class="table-responsive">
            <table id="dataTable" class="table table-bordered table-hover mx-auto" style="width:80%; border-radius: 10%;">       
            </table>
        </div>
        <br>

        <div id="input-area" style="display:none;margin-top: 10px;">
            <center>
                <label for="pro-id">Enter project id:</label>
                <input type="number" id="pro-id" name="pro-id">
                <button id="submit-btn" class="btn btn-primary btn-sm">Submit</button>
            </center>
        </div>

        <div class="sticky-bottom bg-light py-2 container d-flex justify-content-center">  
            <div>
                <a href="addProject.html" class="btn bg-primary text-white">+ Add</a>
                <button class="btn bg-danger text-light" id="remove" name="remove">- Remove</button>
            </div>         
        </div>

        <script>
            async function loadTable() {
                const response = await fetch('Projects');
                const data = await response.json();

                if (!data || data.length === 0) {
                    document.getElementById("dataTable").innerHTML = "<tr><td>No data</td></tr>";
                    return;
                }

                const headers = Object.keys(data[0]);
                let tableHTML = "<thead><tr>" +
                        headers.map(h => `<th style="background-color:orangered;" class="text-white text-uppercase">${h}</th>`).join("") +
                        "</tr></thead><tbody>";

                data.forEach(row => {
                    tableHTML += "<tr>" +
                            headers.map(h => {
                                if (h.toLowerCase() === "image") {
                                    // row.p_id or whatever your project ID column is called
                                    return `<td><img src="ProjectImage?pro-id=${row.p_id}" width="220" height="100" style="object-fit:cover;" onerror="this.src='default.png';" /></td>`;
                                } else {
                                    return `<td>${row[h]}</td>`;
                                }
                            }).join("") +
                            "</tr>";
                });

                tableHTML += "</tbody>";
                document.getElementById("dataTable").innerHTML = tableHTML;
            }

            loadTable();

            const showInputBtn = document.getElementById("remove");
            const inputArea = document.getElementById("input-area");
            const submitBtn = document.getElementById("submit-btn");

            showInputBtn.addEventListener("click", function () {
                inputArea.style.display = "block";
            });

            submitBtn.addEventListener("click", function () {
                const projectId = document.getElementById("pro-id").value.trim();

                if (projectId === "") {
                    alert("Please enter a project ID!");
                    return;
                }

                const params = new URLSearchParams();
                params.append("pro-id", projectId);

                fetch("ProjectRemoval", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: params
                })
                        .then(res => res.json())
                        .then(data => {
                            if (data.action) {
                                alert(data.message);
                                location.reload();
                            } else {
                                alert("Error: " + data.message);
                            }
                        })
                        .catch(err => {
                            console.error("Error:", err);
                            alert("Something went wrong. Please try again later.");
                        });
            });

        </script>
    </body>
</html>
